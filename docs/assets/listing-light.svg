<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Graphite — a calm task manager for Obsidian">
  <title>Graphite</title>
  <rect x="0" y="0" width="1280" height="640" fill="#f5f7f4"/>
  <rect x="40.75" y="40.75" width="1198.5" height="558.5" rx="20" fill="none" stroke="#d7e0d9" stroke-width="1.5"/>

  <text x="640" y="128" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" font-weight="600" letter-spacing="4" fill="#81918a" text-anchor="middle">OBSIDIAN PLUGIN</text>

  <!-- checkbox motif -->
  <rect x="592" y="168" width="96" height="96" rx="22" fill="none" stroke="#007a4d" stroke-width="6"/>
  <path d="M616 218 l20 21 l44 -47" fill="none" stroke="#007a4d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark + cursor, group-centered around x=640 -->
  <text x="335" y="410" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="128" font-weight="700" letter-spacing="1" fill="#17201d">graphite</text>
  <rect x="922" y="324" width="24" height="92" rx="3" fill="#007a4d"/>

