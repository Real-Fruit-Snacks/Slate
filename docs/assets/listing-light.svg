  <text x="640" y="538" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" letter-spacing="3" fill="#81918a" text-anchor="middle">INBOX · TODAY · PROJECTS · RECURRING · LABELS · ACTIVITY</text>
